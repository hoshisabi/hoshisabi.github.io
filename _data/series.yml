- id: basht
  title: "The Peculiar Village of Basht"
  tagline: "U-Con Charity Adventures · 5e"
  description: >
    A loose, growing collection of one-shots set in a strange little village
    where the mayor is a goat and the festivals are stranger still. Written
    for U-Con's Adventurers League track and meant to be playable as standalone
    sittings or as a building friendship with the town across conventions.

- id: erland_forsk
  title: "The Strange Case of Erland Forsk"
  tagline: "Icewind Dale · Connected Mysteries"
  description: >
    Four short mysteries unfolding in the town of Easthaven during the events of
    *Rime of the Frostmaiden*. Each adventure stands on its own, but together
    they trace a single thread back to the Forsk estate — and whatever has
    taken up residence in the attic. Best run in order. The bundle collects
    all four at a discount.

- id: standalone
  title: "Not Part of a Series"
  description: >
    One-off adventures. Self-contained, drop-in options for an evening of play.

- id: book_club
  title: "Book Club"
  tagline: "Spelljammer · Captain's Errand"
  description: >
    A short Spelljammer arc with an intentionally quirky mixture of metafiction,
    eldritch horror, and children's stories.

- id: ad_astra
  title: "Ad Astra"
  tagline: "Dungeon Designers · Sci-Fi Horror"
  description: >
    A collaborative series from the Dungeon Designers Discord — a mixture of
    many different styles of adventure, mine focused on space horror.
