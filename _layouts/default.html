<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    LEARNING NOTE: Liquid output tags  {{ }}
    ─────────────────────────────────────────
    Liquid runs BEFORE the browser sees any HTML — even before HTML comments.
    That means you can't just write {% raw %}{{ page.title }}{% endraw %} in a comment to illustrate it;
    Liquid would evaluate it immediately. Use raw/endraw tags to show code literally.

    {% raw %}{{ page.title }}{% endraw %}   → the "title:" value from a page's front matter
    {% raw %}{{ site.title }}{% endraw %}   → the "title:" value from _config.yml
    {% raw %}{{ value | default: "fallback" }}{% endraw %}  → use "fallback" if value is empty or nil
    &mdash;       → HTML entity for an em dash —
  -->
  <title>{{ page.title | default: site.title }} &mdash; {{ site.title }}</title>

  <!--
    LEARNING NOTE: the relative_url filter
    ────────────────────────────────────────
    {% raw %}{{ '/assets/css/style.css' | relative_url }}{% endraw %} prepends site.baseurl so links
    work whether the site lives at "/" or in a subdirectory like "/blog/".
    For a root-domain GitHub Pages site this is a no-op, but it's good practice.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!--
    LEARNING NOTE: if/endif tags
    ─────────────────────────────────────
    {% raw %}{% if condition %}...{% endif %}{% endraw %} lets you conditionally include markup.
    page.mermaid is a custom boolean we set in front matter on any page
    that contains Mermaid diagrams (e.g. "mermaid: true").
  -->
  {% if page.mermaid %}
    {% include mermaid.html %}
  {% endif %}
</head>

<body>

  <!--
    LEARNING NOTE: includes
    ────────────────────────
    {% raw %}{% include filename.html %}{% endraw %} pastes the contents of _includes/filename.html
    right here at build time. Use includes for nav, footers, or any
    markup you want to reuse across multiple pages.
  -->
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">
        <img class="header-avatar" src="{{ '/media/oldpicture.jpg' | relative_url }}" alt="Dan Chapman">
        {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/myadventures' | relative_url }}">Adventures</a>
        
        <!-- Campaigns Dropdown Menu -->
        <div class="nav-dropdown">
          <button class="dropdown-trigger" aria-haspopup="true" aria-expanded="false">
            Campaigns <span class="arrow">▼</span>
          </button>
          <div class="dropdown-menu">
            <div class="dropdown-section-title">Running (Active)</div>
            <a href="{{ '/rpg/icewind-dale/public/' | relative_url }}">Icewind Dale</a>
            <a href="{{ '/rpg/pandodnd/public/' | relative_url }}">PandoDnD Pub Crawl</a>
            <a href="{{ '/rpg/phandelver' | relative_url }}">Phandelver (Finished)</a>
            <div class="dropdown-section-title">Played & Retired</div>
            <a href="{{ '/rpg/spare/spare' | relative_url }}">Spare (Retired)</a>
            <a href="{{ '/rpg/burgess/' | relative_url }}">Burgess</a>
            <a href="{{ '/rpg/rool/' | relative_url }}">Rool</a>
          </div>
        </div>

        <a href="{{ '/ucon' | relative_url }}">U-Con</a>
        <a href="http://pandodnd.com">Pando DND</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <!--
      LEARNING NOTE: the content variable
      ──────────────────────────────
      {% raw %}{{ content }}{% endraw %} is the one magic variable that only works inside a layout file.
      Jekyll takes the current page (already converted from Markdown to HTML),
      and injects it here. Every page gets the same header/footer; only the
      content in the middle changes.
    -->
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Daniel E. Chapman II &mdash;
        <a href="https://twitter.com/hoshisabi">@hoshisabi</a>
      </p>
    </div>
  </footer>

</body>
</html>
